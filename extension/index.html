<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
</head>
<body>
    <h1>Spark</h1>
    <div class="container">
        <button id="clearBtn">Clear</button>
        <div id="messages">
            <div class="message assistant">Hello! I am Spark, your smart assistant that help you brainstorm ideas. How can I assist you today?</div>
            <div class="message user">I need some ideas for a new marketing campaign.</div>
        </div>
        <div id="inputContainer">
            <input type="text" id="userInput" placeholder="Type your message here...">
            <button id="sendButton">
                <!-- paper plane icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</body>
</html>
